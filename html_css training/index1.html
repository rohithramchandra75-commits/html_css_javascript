<!DOCTYPE html>
<html>
<head>
    <title>HTML + JavaScript Example</title>
</head>
<body>

    <h1>Simple JavaScript Program</h1>

    <p id="demo">Click the button to change this text.</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("demo").innerHTML = "Hello Rohith! JavaScript is working 🎉";
        }
    </script>

</body>
</html>
