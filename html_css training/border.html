<!DOCTYPE html>
<html>
<head>
    <title>Box Model Example</title>
    <style>
        body {
            background-color: #f2f2f2;
        }

        .box {
            width: 250px;

            /* Content styling */
            background-color: lightgreen;

            /* Padding (inside space) */
            padding: 20px;

            /* Border */
            border: 5px solid black;

            /* Margin (outside space) */
            margin: 40px;

            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="box">
        This box shows margin, padding, and border together.
    </div>

</body>
</html>
